<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>약속지도</title>
  <link rel="preconnect" href="https://dapi.kakao.com">
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #65707f;
      --line: #d9dee7;
      --paper: #f7f8fb;
      --panel: #ffffff;
      --green: #0e7c66;
      --red: #d9473f;
      --yellow: #f0b429;
      --blue: #2671d9;
      --orange: #df6b21;
      --shadow: 0 18px 45px rgba(27, 39, 51, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: var(--paper);
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(340px, 450px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px;
      overflow: auto;
      background: var(--panel);
      border-right: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .badge {
      flex: 0 0 auto;
      padding: 7px 10px;
      color: #ffffff;
      background: var(--green);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: #344152;
      font-size: 13px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 11px 12px;
      color: var(--ink);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(38, 113, 217, 0.14);
    }

    .field textarea {
      min-height: 78px;
      resize: vertical;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 16px;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .actions,
    .pin-actions,
    .search-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      min-height: 38px;
      padding: 9px 12px;
      color: var(--ink);
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover {
      border-color: #aeb8c6;
    }

    .btn.primary {
      color: #ffffff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .btn.danger {
      color: #ffffff;
      background: var(--red);
      border-color: var(--red);
    }

    .search-box {
      display: grid;
      gap: 8px;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .search-meta {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px;
    }

    .search-results {
      display: grid;
      gap: 8px;
    }

    .result-card {
      display: grid;
      gap: 8px;
      padding: 10px;
      background: #fbfcff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .result-card strong {
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .result-card small {
      color: var(--muted);
      line-height: 1.35;
    }

    .route-panel {
      display: grid;
      gap: 8px;
      padding: 12px;
      background: #fff8ef;
      border: 1px solid #ffd0a3;
      border-radius: 8px;
    }

    .route-panel strong {
      color: #7a390d;
      line-height: 1.3;
    }

    .route-panel a {
      color: var(--blue);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .timeline {
      display: grid;
      gap: 10px;
    }

    .stop-card {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .stop-index {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      color: #ffffff;
      background: var(--blue);
      border-radius: 50%;
      font-weight: 800;
    }

    .stop-main {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .stop-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
    }

    .stop-head strong {
      display: block;
      line-height: 1.25;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .time-chip {
      flex: 0 0 auto;
      padding: 5px 8px;
      color: #7a390d;
      background: #fff0df;
      border: 1px solid #ffd0a3;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .method-chip {
      justify-self: start;
      padding: 5px 8px;
      color: #174d43;
      background: #e8f6f1;
      border: 1px solid #bfe3d8;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .coords {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .stop-card p {
      margin: 0;
      color: #465469;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .map-wrap {
      position: relative;
      min-height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 100vh;
    }

    .map-help {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 500;
      max-width: min(360px, calc(100vw - 32px));
      padding: 10px 12px;
      color: #263241;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(27, 39, 51, 0.12);
      font-size: 13px;
      line-height: 1.4;
    }

    .share-toast {
      position: absolute;
      right: 22px;
      bottom: 22px;
      z-index: 500;
      max-width: min(420px, calc(100vw - 44px));
      padding: 12px 14px;
      color: #ffffff;
      background: rgba(23, 32, 42, 0.92);
      border-radius: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.2s ease;
      pointer-events: none;
    }

    .share-toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .route-marker {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      color: #ffffff;
      background: var(--blue);
      border: 3px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
      font-size: 13px;
      font-weight: 900;
      cursor: grab;
    }

    .route-marker:active {
      cursor: grabbing;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(23, 32, 42, 0.38);
    }

    .modal-backdrop.visible {
      display: flex;
    }

    .modal {
      display: grid;
      gap: 14px;
      width: min(430px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      padding: 18px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(23, 32, 42, 0.22);
    }

    .modal h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .modal-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .popup-title {
      margin: 0 0 5px;
      font-weight: 800;
    }

    .popup-note {
      margin: 0;
      color: #465469;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: 50vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .map-wrap,
      #map {
        min-height: 50vh;
      }

      .map-help {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="약속 일정과 장소 목록">
      <div class="brand">
        <h1>약속지도</h1>
        <span class="badge">Meet Map</span>
      </div>

      <div class="field search-box">
        <label for="placeSearch">장소 검색</label>
        <div class="search-row">
          <input id="placeSearch" placeholder="예: 11:00 석촌역, 서울숲" autocomplete="off">
          <button class="btn primary" id="searchPlace" type="button">검색</button>
        </div>
        <div class="search-meta">
          <input id="searchTime" placeholder="11:00" autocomplete="off">
          <p class="hint">시간을 입력하면 검색 결과의 일정 추가에 바로 적용됩니다.</p>
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>

      <div class="field">
        <label for="meetingTitle">약속 이름</label>
        <input id="meetingTitle" value="우리 약속 동선" autocomplete="off">
      </div>

      <div class="field">
        <label for="meetingDate">약속 날짜</label>
        <input id="meetingDate" placeholder="예: 6월 15일 토요일" autocomplete="off">
      </div>

      <div class="field">
        <label for="defaultMoveMethod">기본 이동 방법</label>
        <select id="defaultMoveMethod">
          <option value="publictransit">버스/지하철</option>
          <option value="bus">버스</option>
          <option value="subway">지하철</option>
          <option value="taxi">택시</option>
          <option value="car">자가</option>
          <option value="foot">걷기</option>
        </select>
      </div>

      <div class="field">
        <label for="meetingNote">안내 메모</label>
        <textarea id="meetingNote" placeholder="회비, 준비물, 이동 방법 등을 적어두세요."></textarea>
      </div>

      <div class="actions">
        <button class="btn primary" id="newCloudPlan" type="button">새 공유 약속</button>
        <button class="btn" id="saveCloudPlan" type="button">서버 저장</button>
        <button class="btn" id="loadCloudPlan" type="button">서버 불러오기</button>
        <button class="btn primary" id="copyLink" type="button">공유 링크 복사</button>
        <button class="btn primary" id="copyKakaoText" type="button">카톡 문구 복사</button>
        <button class="btn" id="openKakaoRoute" type="button">카카오맵 경로</button>
        <button class="btn" id="openNaverMap" type="button">네이버 지도</button>
        <button class="btn" id="locateMe" type="button">현재 위치</button>
        <button class="btn danger" id="clearAll" type="button">초기화</button>
      </div>

      <p class="hint" id="cloudStatus">현재는 이 브라우저와 공유 링크에만 저장됩니다.</p>
      <p class="hint">지도에서 장소를 클릭하거나 검색 결과를 일정에 추가하세요. 추가한 핀은 마우스로 끌어 위치를 조정할 수 있습니다.</p>

      <div class="route-panel" id="routePanel" hidden>
        <strong>카카오맵 경로</strong>
        <a id="routeLink" href="#" target="_blank" rel="noopener">카카오맵에서 경로 보기</a>
        <p class="hint" id="routeSummary"></p>
      </div>

      <div class="section-title">
        <h2>시간대별 장소</h2>
        <span id="pinCount" class="hint">0곳</span>
      </div>

      <div class="timeline" id="pins"></div>
    </aside>

    <section class="map-wrap" aria-label="이동 경로 지도">
      <div id="map"></div>
      <div class="map-help">핀 번호는 시간순 일정입니다. 선은 장소 간 이동 순서를 보여줍니다.</div>
      <div id="toast" class="share-toast" role="status" aria-live="polite"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="stopModal" aria-hidden="true">
    <form class="modal" id="stopForm">
      <h2 id="stopModalTitle">일정 추가</h2>
      <div class="field">
        <label for="stopTime">방문 시간</label>
        <input id="stopTime" autocomplete="off" required>
      </div>
      <div class="field">
        <label for="stopName">장소 이름</label>
        <input id="stopName" autocomplete="off" required>
      </div>
      <div class="field">
        <label for="stopMoveMethod">이동 방법</label>
        <select id="stopMoveMethod">
          <option value="publictransit">버스/지하철</option>
          <option value="bus">버스</option>
          <option value="subway">지하철</option>
          <option value="taxi">택시</option>
          <option value="car">자가</option>
          <option value="foot">걷기</option>
        </select>
      </div>
      <div class="field">
        <label for="stopNote">장소 메모</label>
        <textarea id="stopNote"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn" id="stopCancel" type="button">취소</button>
        <button class="btn primary" type="submit">저장</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="messageModal" aria-hidden="true">
    <div class="modal">
      <h2 id="messageTitle">확인</h2>
      <p class="hint" id="messageText"></p>
      <div class="field" id="messageCopyField" hidden>
        <label for="messageCopyText">복사할 내용</label>
        <textarea id="messageCopyText" readonly></textarea>
      </div>
      <div class="modal-actions" id="messageActions"></div>
    </div>
  </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6e39735fb1832700c7fa056d2377b6b6&autoload=false"></script>
  <script>
    const COLORS = ["#2671d9", "#d9473f", "#0e7c66", "#f0b429", "#9b59b6", "#df6b21"];
    const STORE_KEY = "meeting-route-share-state";
    const DEFAULT_CENTER = [37.5665, 126.9780];
    const SUPABASE_URL = "https://xbvoqrvnyozilurrvvra.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_VgzvutLBYvvAUjmpMZJzEg_2_fxS155";
    const SUPABASE_TABLE = "yaksojido";

    const state = normalizeState(loadState());
    state.planId = getPlanIdFromUrl() || state.planId || "";
    const markers = new Map();
    let routeLine = null;
    let pendingSearchTime = "";
    let markerDragMoved = false;
    let map = null;

    const els = {
      title: document.querySelector("#meetingTitle"),
      date: document.querySelector("#meetingDate"),
      defaultMoveMethod: document.querySelector("#defaultMoveMethod"),
      note: document.querySelector("#meetingNote"),
      search: document.querySelector("#placeSearch"),
      searchTime: document.querySelector("#searchTime"),
      searchButton: document.querySelector("#searchPlace"),
      searchResults: document.querySelector("#searchResults"),
      pins: document.querySelector("#pins"),
      count: document.querySelector("#pinCount"),
      routePanel: document.querySelector("#routePanel"),
      routeLink: document.querySelector("#routeLink"),
      routeSummary: document.querySelector("#routeSummary"),
      cloudStatus: document.querySelector("#cloudStatus"),
      newCloudPlan: document.querySelector("#newCloudPlan"),
      saveCloudPlan: document.querySelector("#saveCloudPlan"),
      loadCloudPlan: document.querySelector("#loadCloudPlan"),
      copy: document.querySelector("#copyLink"),
      copyKakaoText: document.querySelector("#copyKakaoText"),
      openKakaoRoute: document.querySelector("#openKakaoRoute"),
      openNaverMap: document.querySelector("#openNaverMap"),
      locate: document.querySelector("#locateMe"),
      clear: document.querySelector("#clearAll"),
      toast: document.querySelector("#toast"),
      stopModal: document.querySelector("#stopModal"),
      stopForm: document.querySelector("#stopForm"),
      stopModalTitle: document.querySelector("#stopModalTitle"),
      stopTime: document.querySelector("#stopTime"),
      stopName: document.querySelector("#stopName"),
      stopMoveMethod: document.querySelector("#stopMoveMethod"),
      stopNote: document.querySelector("#stopNote"),
      stopCancel: document.querySelector("#stopCancel"),
      messageModal: document.querySelector("#messageModal"),
      messageTitle: document.querySelector("#messageTitle"),
      messageText: document.querySelector("#messageText"),
      messageCopyField: document.querySelector("#messageCopyField"),
      messageCopyText: document.querySelector("#messageCopyText"),
      messageActions: document.querySelector("#messageActions")
    };

    els.title.value = state.title;
    els.date.value = state.date;
    els.defaultMoveMethod.value = state.defaultMoveMethod;
    els.note.value = state.note;

    kakao.maps.load(() => {
      initMap();
      bindMapEvents();
      render();
      updateCloudStatus();
      if (state.planId && isCloudConfigured()) {
        loadCloudPlan();
      }
    });

    function initMap() {
      const center = state.center || DEFAULT_CENTER;
      map = new kakao.maps.Map(document.querySelector("#map"), {
        center: toKakaoLatLng(center[0], center[1]),
        level: zoomToKakaoLevel(state.zoom || 12)
      });
      map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);
    }

    function bindMapEvents() {
      kakao.maps.event.addListener(map, "click", (event) => {
        const position = event.latLng;
        const index = state.pins.length + 1;
        openStopModal({
          mode: "add",
          title: "일정 추가",
          values: {
            time: nextTimeLabel(index),
            name: `장소 ${index}`,
            moveMethod: state.defaultMoveMethod,
            note: "",
            lat: round(position.getLat()),
            lng: round(position.getLng())
          }
        });
      });

      kakao.maps.event.addListener(map, "idle", () => {
        const center = map.getCenter();
        state.center = [round(center.getLat()), round(center.getLng())];
        state.zoom = kakaoLevelToZoom(map.getLevel());
        persist(false);
      });
    }

    [els.title, els.date, els.note, els.defaultMoveMethod].forEach((el) => {
      el.addEventListener("input", () => {
        state.title = els.title.value.trim() || "우리 약속 동선";
        state.date = els.date.value.trim();
        state.defaultMoveMethod = els.defaultMoveMethod.value;
        state.note = els.note.value.trim();
        persist();
      });
    });

    els.searchButton.addEventListener("click", searchPlaces);
    els.search.addEventListener("keydown", (event) => {
      if (event.key === "Enter") searchPlaces();
    });

    els.newCloudPlan.addEventListener("click", () => {
      state.planId = makePlanId();
      persist();
      updateCloudStatus();
      showToast("새 공유 약속 ID를 만들었습니다. 서버 저장을 누르면 공유됩니다.");
    });

    els.saveCloudPlan.addEventListener("click", saveCloudPlan);
    els.loadCloudPlan.addEventListener("click", loadCloudPlan);

    els.copy.addEventListener("click", async () => {
      const link = makeShareUrl();
      try {
        await navigator.clipboard.writeText(link);
        showToast("공유 링크를 복사했습니다.");
      } catch {
        openMessageModal({ title: "공유 링크", message: "아래 링크를 복사하세요.", copyText: link });
      }
    });

    els.copyKakaoText.addEventListener("click", async () => {
      const text = makeKakaoShareText();
      try {
        await navigator.clipboard.writeText(text);
        showToast("카톡에 붙여넣을 문구를 복사했습니다.");
      } catch {
        openMessageModal({ title: "카톡 문구", message: "아래 문구를 복사해 카카오톡에 붙여넣으세요.", copyText: text });
      }
    });

    els.openKakaoRoute.addEventListener("click", () => {
      const url = makeKakaoRouteUrl();
      if (!url) {
        showToast("경로를 보려면 일정을 1곳 이상 추가하세요.");
        return;
      }
      window.open(url, "_blank", "noopener");
    });

    els.openNaverMap.addEventListener("click", () => {
      const pins = orderedPins();
      if (!pins.length) {
        showToast("네이버 지도에서 열 장소를 먼저 추가하세요.");
        return;
      }
      window.open(makeNaverPlaceUrl(pins[0]), "_blank", "noopener");
    });

    els.locate.addEventListener("click", () => {
      if (!navigator.geolocation) {
        showToast("이 브라우저에서는 현재 위치를 사용할 수 없습니다.");
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (position) => {
          setMapView(position.coords.latitude, position.coords.longitude, 15);
          showToast("현재 위치 근처로 이동했습니다.");
        },
        () => showToast("현재 위치를 가져오지 못했습니다.")
      );
    });

            <div class="stop-head">
              <div>
                <strong></strong>
                <div class="coords">${pin.lat.toFixed(5)}, ${pin.lng.toFixed(5)}</div>
              </div>
              <span class="time-chip"></span>
            </div>
            <span class="method-chip"></span>
            <p></p>
            <div class="pin-actions">
              <button class="btn" type="button" data-action="focus">지도 보기</button>
              <button class="btn" type="button" data-action="naver">네이버</button>
              <button class="btn" type="button" data-action="kakao">카카오</button>

        card.querySelector("p").textContent = pin.note || "메모 없음";
        card.querySelector('[data-action="focus"]').addEventListener("click", () => {
          setMapView(pin.lat, pin.lng, 16);
          openMarkerInfo(pin.id);
        });
        card.querySelector('[data-action="naver"]').addEventListener("click", () => {
          window.open(makeNaverPlaceUrl(pin), "_blank", "noopener");
        });
        card.querySelector('[data-action="kakao"]').addEventListener("click", () => {
          window.open(makeKakaoLookUrl(pin), "_blank", "noopener");
        });
        card.querySelector('[data-action="edit"]').addEventListener("click", () => editPin(pin.id));
        card.querySelector('[data-action="delete"]').addEventListener("click", () => deletePin(pin.id));

      });

    async function searchPlaces() {
      const parsed = parseSearchQuery(els.search.value);
      pendingSearchTime = parsed.time;
      if (parsed.time) {
        els.searchTime.value = parsed.time;
      }
      if (!parsed.place) {
        showToast("검색할 장소명을 입력하세요.");
        return;
      }

      els.searchButton.disabled = true;
      els.searchResults.innerHTML = '<p class="hint">검색 중입니다...</p>';

      try {
        const url = new URL("https://nominatim.openstreetmap.org/search");
        url.searchParams.set("format", "jsonv2");
        url.searchParams.set("limit", "5");
        url.searchParams.set("accept-language", "ko");
        url.searchParams.set("q", parsed.place);

        const response = await fetch(url);
        if (!response.ok) throw new Error("search failed");
        const results = await response.json();
        renderSearchResults(results);
      } catch {
        els.searchResults.innerHTML = '<p class="hint">검색에 실패했습니다. 잠시 후 다시 시도하세요.</p>';
      } finally {
        els.searchButton.disabled = false;
      }
    }

    function renderSearchResults(results) {
      els.searchResults.innerHTML = "";
      if (!results.length) {
        els.searchResults.innerHTML = '<p class="hint">검색 결과가 없습니다.</p>';
        return;
      }

      results.forEach((result) => {
        const lat = Number(result.lat);
        const lng = Number(result.lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;

        const card = document.createElement("article");
        card.className = "result-card";
        card.innerHTML = `
          <strong></strong>
          <small></small>
          <div class="search-actions">
            <button class="btn" type="button" data-action="move">지도 이동</button>
            <button class="btn primary" type="button" data-action="add">일정 추가</button>
          </div>
        `;
        card.querySelector("strong").textContent = result.name || result.display_name.split(",")[0];
        card.querySelector("small").textContent = result.display_name;
        card.querySelector('[data-action="move"]').addEventListener("click", () => {
          setMapView(lat, lng, 16);
          showToast("검색한 장소로 이동했습니다.");
        });
        card.querySelector('[data-action="add"]').addEventListener("click", () => {
          addStopFromSearch({
            name: result.name || result.display_name.split(",")[0],
            lat,
            lng
          });
        });
        els.searchResults.append(card);
      });
    }

    function addStopFromSearch(place) {
      const index = state.pins.length + 1;
      const time = normalizeTimeLabel(els.searchTime.value.trim() || pendingSearchTime || nextTimeLabel(index));
      openStopModal({
        mode: "add",
        title: "검색 장소 일정 추가",
        values: {
          time,
          name: place.name.trim(),
          moveMethod: state.defaultMoveMethod,
          note: "",
          lat: round(place.lat),
          lng: round(place.lng)
        }
      });
    }

    function makeKakaoShareText() {
      const pins = orderedPins();
      const lines = [
        state.title,
        state.date ? `날짜: ${state.date}` : "",
        state.note ? `메모: ${state.note}` : "",
        `기본 이동: ${moveMethodLabel(state.defaultMoveMethod)}`,
        "",
        "[일정]"
      ].filter(Boolean);

      if (!pins.length) {
        lines.push("아직 장소가 없습니다.");
      } else {
        pins.forEach((pin, index) => {
          lines.push(`${index + 1}. ${pin.time || "시간 미정"} ${pin.name} (${index === 0 ? "도착" : moveMethodLabel(pin.moveMethod || state.defaultMoveMethod)})`);
        });
      }

      const kakaoRoute = makeKakaoRouteUrl();
      if (kakaoRoute) {
        lines.push("");
        lines.push(`카카오맵 경로: ${kakaoRoute}`);
      }

      lines.push("");
      lines.push(`공유 페이지: ${makeShareUrl()}`);
      return lines.join("\n");
    }

    async function saveCloudPlan() {
      if (!isCloudConfigured()) {
        showToast("Supabase 설정값을 넣으면 서버 저장을 사용할 수 있습니다.");
        return;
      }
      if (!state.planId) {
        state.planId = makePlanId();
      }

      try {
        await supabaseRequest(`/rest/v1/${SUPABASE_TABLE}?on_conflict=id`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Prefer: "resolution=merge-duplicates,return=representation"
          },
          body: JSON.stringify([{ id: Number(state.planId), data: makePayload() }])
        });
        persist();
        updateCloudStatus();
        showToast("서버에 저장했습니다. 같은 링크로 최신 내용을 볼 수 있습니다.");
      } catch (error) {
        console.error(error);
        showToast("서버 저장에 실패했습니다. Supabase 설정과 테이블을 확인하세요.");
      }
    }

    async function loadCloudPlan() {
      if (!isCloudConfigured()) {
        showToast("Supabase 설정값을 넣으면 서버 불러오기를 사용할 수 있습니다.");
        return;
      }
      if (!state.planId) {
        showToast("불러올 약속 ID가 없습니다.");
        return;
      }

      try {
        const rows = await supabaseRequest(`/rest/v1/${SUPABASE_TABLE}?id=eq.${encodeURIComponent(state.planId)}&select=data`, {
          method: "GET"
        });
        if (!rows.length) {
          showToast("서버에서 약속을 찾지 못했습니다.");
          return;
        }
        const loaded = normalizeState({ ...rows[0].data, planId: state.planId });
        Object.assign(state, loaded);
        syncFormFromState();
        persist(false);
        render(true);
        updateCloudStatus();
        showToast("서버에서 최신 약속을 불러왔습니다.");
      } catch (error) {
        console.error(error);
        showToast("서버 불러오기에 실패했습니다.");
      }
    }

    async function supabaseRequest(path, options) {
      const response = await fetch(`${SUPABASE_URL}${path}`, {
        ...options,
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          ...(options.headers || {})
        }
      });
      const text = await response.text();
      if (!response.ok) throw new Error(text || "Supabase request failed");
      if (response.status === 204) return null;
      return text ? JSON.parse(text) : null;
    }

    function isCloudConfigured() {
      return Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
    }

    function updateCloudStatus() {
      const mode = isCloudConfigured() ? "서버 저장 가능" : "서버 설정 전";
      const idText = state.planId ? `약속 ID: ${state.planId}` : "약속 ID 없음";
      els.cloudStatus.textContent = `${mode} · ${idText}`;
    }

    function syncFormFromState() {
      els.title.value = state.title;
      els.date.value = state.date;
      els.defaultMoveMethod.value = state.defaultMoveMethod;
      els.note.value = state.note;
    }

    function makeNaverPlaceUrl(pin) {
      const query = encodeURIComponent(pin.name);
      return `https://map.naver.com/p/search/${query}`;
    }

    function makeKakaoLookUrl(pin) {
      return `http://m.map.kakao.com/scheme/look?p=${pin.lat},${pin.lng}`;
    }

    function makeKakaoRouteUrl() {
      const pins = orderedPins();
      if (!pins.length) return "";
      if (pins.length === 1) return makeKakaoLookUrl(pins[0]);

      const params = new URLSearchParams();
      const start = pins[0];
      const end = pins[pins.length - 1];
      params.set("sp", `${start.lat},${start.lng}`);
      pins.slice(1, -1).slice(0, 5).forEach((pin, index) => {
        params.set(index === 0 ? "vp" : `vp${index + 1}`, `${pin.lat},${pin.lng}`);
      });
      params.set("ep", `${end.lat},${end.lng}`);
      params.set("by", kakaoRouteMethod(state.defaultMoveMethod));
      return `http://m.map.kakao.com/scheme/route?${params.toString()}`;
    }

    function parseSearchQuery(value) {
      const raw = String(value || "").trim();
      const match = raw.match(/^(\d{1,2}(?::\d{1,2})?|\d{1,2}\s*시(?:\s*\d{1,2}\s*분)?)\s+(.+)$/);
      if (!match) return { time: "", place: raw };
      return {
        time: normalizeTimeLabel(match[1]),
        place: match[2].trim()
      };
    }

    function normalizeTimeLabel(value) {
      const text = String(value || "").replace(/\s/g, "");
      const colon = text.match(/^(\d{1,2})(?::(\d{1,2}))?$/);
      if (colon) return `${colon[1].padStart(2, "0")}:${(colon[2] || "00").padStart(2, "0")}`;
      const korean = text.match(/^(\d{1,2})시(?:(\d{1,2})분)?$/);
      if (korean) return `${korean[1].padStart(2, "0")}:${(korean[2] || "00").padStart(2, "0")}`;
      return value;
    }

    function renderMarkers() {
      const pins = orderedPins();
      markers.forEach((marker, id) => {
        if (!pins.some((pin) => pin.id === id)) {
          marker.overlay.setMap(null);
          marker.marker.setMap(null);
          markers.delete(id);
        }
      });

      pins.forEach((pin, index) => {
        const position = toKakaoLatLng(pin.lat, pin.lng);
        const content = `<button class="route-marker" type="button" data-marker-id="${escapeHtml(pin.id)}" style="background:${pin.color}">${index + 1}</button>`;
        if (markers.has(pin.id)) {
          const entry = markers.get(pin.id);
          entry.marker.setPosition(position);
          entry.overlay.setPosition(position);
          entry.overlay.setContent(content);
          return;
        }

        const marker = new kakao.maps.Marker({
          position,
          draggable: true,
          opacity: 0
        });
        marker.setMap(map);

        const overlay = new kakao.maps.CustomOverlay({
          position,
          content,
          yAnchor: 0.5,
          xAnchor: 0.5,
          clickable: true
        });
        overlay.setMap(map);
        markers.set(pin.id, { marker, overlay });
        attachMarkerDrag(marker, overlay, pin.id);
      });
      bindMarkerOverlayClicks();
    }

    function attachMarkerDrag(marker, overlay, id) {
      kakao.maps.event.addListener(marker, "dragend", () => {
        const pin = state.pins.find((item) => item.id === id);
        if (!pin) return;
        const position = marker.getPosition();
        overlay.setPosition(position);
        pin.lat = round(position.getLat());
        pin.lng = round(position.getLng());
        persist();
        renderPins();
        renderRoute();
        renderRoutePanel();
        showToast("핀 위치를 수정했습니다.");
      });
    }

    function bindMarkerOverlayClicks() {
      document.querySelectorAll("[data-marker-id]").forEach((button) => {
        button.addEventListener("mousedown", (event) => startMarkerOverlayDrag(event, button.dataset.markerId));
        button.addEventListener("click", () => {
          if (markerDragMoved) {
            markerDragMoved = false;
            return;
          }
          openMarkerInfo(button.dataset.markerId);
        });
      });
    }

    function startMarkerOverlayDrag(event, id) {
      event.preventDefault();
      const entry = markers.get(id);
      const pin = state.pins.find((item) => item.id === id);
      if (!entry || !pin) return;

      markerDragMoved = false;
      map.setDraggable(false);

      const move = (moveEvent) => {
        markerDragMoved = true;
        const rect = document.querySelector("#map").getBoundingClientRect();
        const point = new kakao.maps.Point(moveEvent.clientX - rect.left, moveEvent.clientY - rect.top);
        const position = map.getProjection().coordsFromContainerPoint(point);
        entry.marker.setPosition(position);
        entry.overlay.setPosition(position);
        pin.lat = round(position.getLat());
        pin.lng = round(position.getLng());
        renderRoute();
        renderRoutePanel();
      };

      const up = () => {
        map.setDraggable(true);
        if (markerDragMoved) {
          persist();
          renderPins();
          showToast("핀 위치를 수정했습니다.");
        }
        window.removeEventListener("mousemove", move);
        window.removeEventListener("mouseup", up);
      };

      window.addEventListener("mousemove", move);
      window.addEventListener("mouseup", up, { once: true });
    }

    function openMarkerInfo(id) {
      const pin = state.pins.find((item) => item.id === id);
      if (!pin) return;
      openMessageModal({
        title: pin.name,
        message: `${pin.time || "시간 미정"}\n${pin.note || "메모 없음"}`
      });
    }

    function renderRoute() {
      if (routeLine) {
        routeLine.setMap(null);
        routeLine = null;
      }
      const path = orderedPins().map((pin) => toKakaoLatLng(pin.lat, pin.lng));
      if (path.length < 2) return;
      routeLine = new kakao.maps.Polyline({
        path,
        strokeWeight: 5,
        strokeColor: "#df6b21",
        strokeOpacity: 0.88,
        strokeStyle: "shortdash"
      });
      routeLine.setMap(map);
    }

    function renderRoutePanel() {
      const pins = orderedPins();
      const routeUrl = makeKakaoRouteUrl();
      if (pins.length < 2 || !routeUrl) {
        els.routePanel.hidden = true;
        els.routeLink.href = "#";
        els.routeSummary.textContent = "";
        return;
      }

      const start = pins[0];
      const end = pins[pins.length - 1];
      els.routePanel.hidden = false;
      els.routeLink.href = routeUrl;
      els.routeSummary.textContent = `${start.time || "출발"} ${start.name} → ${end.time || "도착"} ${end.name}`;
    }

    function editPin(id) {
      const pin = state.pins.find((item) => item.id === id);
      if (!pin) return;
      openStopModal({
        mode: "edit",
        title: "일정 수정",
        pinId: id,
        values: pin
      });
    }

    function deletePin(id) {
      const pin = state.pins.find((item) => item.id === id);
      if (!pin) return;
      openMessageModal({
        title: "일정 삭제",
        message: `${pin.time || "시간 미정"} ${pin.name} 일정을 삭제할까요?`,
        confirmText: "삭제",
        danger: true,
        onConfirm: () => {
          state.pins = state.pins.filter((item) => item.id !== id);
          state.pins = orderedPins().map((item, index) => ({ ...item, order: index + 1 }));
          persist();
          render(true);
          showToast("일정을 삭제했습니다.");
        }
      });
    }

    function openStopModal({ mode, title, values, pinId = "" }) {
      els.stopModal.dataset.mode = mode;
      els.stopModal.dataset.pinId = pinId;
      els.stopModal.dataset.lat = values.lat;
      els.stopModal.dataset.lng = values.lng;
      els.stopModalTitle.textContent = title;
      els.stopTime.value = values.time || "";
      els.stopName.value = values.name || "";
      els.stopMoveMethod.value = values.moveMethod || state.defaultMoveMethod;
      els.stopNote.value = values.note || "";
      els.stopModal.classList.add("visible");
      els.stopModal.setAttribute("aria-hidden", "false");
      setTimeout(() => els.stopTime.focus(), 0);
    }

    function closeStopModal() {
      els.stopModal.classList.remove("visible");
      els.stopModal.setAttribute("aria-hidden", "true");
      els.stopForm.reset();
      els.stopModal.dataset.mode = "";
      els.stopModal.dataset.pinId = "";
      els.stopModal.dataset.lat = "";
      els.stopModal.dataset.lng = "";
    }

    els.stopForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const mode = els.stopModal.dataset.mode;
      const pinId = els.stopModal.dataset.pinId;
      const name = els.stopName.value.trim();
      const time = els.stopTime.value.trim();
      if (!name || !time) {
        showToast("시간과 장소 이름을 입력하세요.");
        return;
      }

      if (mode === "edit") {
        const pin = state.pins.find((item) => item.id === pinId);
        if (!pin) return;
        pin.time = time;
        pin.name = name;
        pin.moveMethod = els.stopMoveMethod.value;
        pin.note = els.stopNote.value.trim();
      } else {
        const index = state.pins.length + 1;
        state.pins.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          order: index,
          moveMethod: els.stopMoveMethod.value,
          time,
          name,
          note: els.stopNote.value.trim(),
          lat: round(Number(els.stopModal.dataset.lat)),
          lng: round(Number(els.stopModal.dataset.lng)),
          color: COLORS[(index - 1) % COLORS.length]
        });
      }

      persist();
      closeStopModal();
      render(true);
      showToast(mode === "edit" ? "일정을 수정했습니다." : "일정을 추가했습니다.");
    });

    function openMessageModal({ title, message, copyText = "", confirmText = "확인", danger = false, onConfirm = null }) {
      els.messageTitle.textContent = title;
      els.messageText.textContent = message;
      els.messageCopyField.hidden = !copyText;
      els.messageCopyText.value = copyText;
      els.messageActions.innerHTML = "";

      const closeButton = document.createElement("button");
      closeButton.className = "btn";
      closeButton.type = "button";
      closeButton.textContent = onConfirm ? "취소" : "닫기";
      closeButton.addEventListener("click", closeMessageModal);
      els.messageActions.append(closeButton);

      if (onConfirm) {
        const confirmButton = document.createElement("button");
        confirmButton.className = `btn ${danger ? "danger" : "primary"}`;
        confirmButton.type = "button";
        confirmButton.textContent = confirmText;
        confirmButton.addEventListener("click", () => {
          closeMessageModal();
          onConfirm();
        });
        els.messageActions.append(confirmButton);
      }

      els.messageModal.classList.add("visible");
      els.messageModal.setAttribute("aria-hidden", "false");
      if (copyText) setTimeout(() => els.messageCopyText.select(), 0);
    }

    function closeMessageModal() {
      els.messageModal.classList.remove("visible");
      els.messageModal.setAttribute("aria-hidden", "true");
      els.messageCopyText.value = "";
      els.messageActions.innerHTML = "";
    }

    function orderedPins() {
      return [...state.pins].sort((a, b) => {
        const byTime = timeValue(a.time) - timeValue(b.time);
        if (byTime !== 0) return byTime;
        return (a.order || 0) - (b.order || 0);
      });
    }

    function timeValue(value) {
      const match = String(value || "").match(/(\d{1,2})\s*[:시]\s*(\d{1,2})?/);
      if (!match) return Number.MAX_SAFE_INTEGER;
      return Number(match[1]) * 60 + Number(match[2] || 0);
    }

    function fitMapToPins() {
      const points = orderedPins().map((pin) => toKakaoLatLng(pin.lat, pin.lng));
      if (points.length === 1) {
        setMapView(points[0].getLat(), points[0].getLng(), 16);
        return;
      }
      const bounds = new kakao.maps.LatLngBounds();
      points.forEach((point) => bounds.extend(point));
      map.setBounds(bounds, 42, 42, 42, 42);
    }

    function setMapView(lat, lng, zoom = 15) {
      map.setCenter(toKakaoLatLng(lat, lng));
      map.setLevel(zoomToKakaoLevel(zoom));
    }

    function toKakaoLatLng(lat, lng) {
      return new kakao.maps.LatLng(Number(lat), Number(lng));
    }

    function zoomToKakaoLevel(zoom) {
      return Math.max(1, Math.min(14, 19 - Number(zoom || 12)));
    }

    function kakaoLevelToZoom(level) {
      return Math.max(1, Math.min(19, 19 - Number(level || 7)));
    }

    function loadState() {
      const fromHash = decodeHash();
      if (fromHash) return fromHash;
      try {
        return JSON.parse(localStorage.getItem(STORE_KEY)) || baseState();
      } catch {
        return baseState();
      }
    }

    function normalizeState(value) {
      const fallback = baseState();
      const next = { ...fallback, ...value };
      next.date = next.date || next.when || "";
      next.defaultMoveMethod = next.defaultMoveMethod || "publictransit";
      next.planId = next.planId || "";
      next.pins = (next.pins || []).map((pin, index) => ({
        id: pin.id || String(Date.now() + index),
        order: pin.order || index + 1,
        moveMethod: pin.moveMethod || next.defaultMoveMethod,
        time: pin.time || "",
        name: pin.name || `장소 ${index + 1}`,
        note: pin.note || "",
        lat: Number(pin.lat),
        lng: Number(pin.lng),
        color: pin.color || COLORS[index % COLORS.length]
      })).filter((pin) => Number.isFinite(pin.lat) && Number.isFinite(pin.lng));
      return next;
    }

    function baseState() {
      return { title: "우리 약속 동선", date: "", note: "", defaultMoveMethod: "publictransit", planId: "", pins: [], center: DEFAULT_CENTER, zoom: 12 };
    }

    function persist(updateHash = true) {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      if (updateHash) history.replaceState(null, "", makeBrowserUrl());
    }

    function makePayload() {
      return {
        title: state.title,
        date: state.date,
        note: state.note,
        defaultMoveMethod: state.defaultMoveMethod,
        planId: state.planId,
        pins: orderedPins(),
        center: state.center,
        zoom: state.zoom
      };
    }

    function makeShareUrl() {
      if (state.planId) return makePlanUrl(state.planId);
      const payload = makePayload();
      return `${location.origin}${location.pathname}#data=${encodePayload(payload)}`;
    }

    function makeBrowserUrl() {
      if (state.planId) return makePlanUrl(state.planId);
      return makeShareUrl();
    }

    function makePlanUrl(planId) {
      const url = new URL(`${location.origin}${location.pathname}`);
      url.searchParams.set("id", planId);
      return url.toString();
    }

    function getPlanIdFromUrl() {
      return new URLSearchParams(location.search).get("id") || "";
    }

    function makePlanId() {
      const stamp = String(Date.now()).slice(-9);
      const random = String(Math.floor(Math.random() * 900) + 100);
      return `${stamp}${random}`;
    }

    function decodeHash() {
      const hash = location.hash.replace(/^#data=/, "");
      if (!hash || hash === location.hash) return null;
      try {
        return JSON.parse(decodeURIComponent(escape(atob(hash))));
      } catch {
        return null;
      }
    }

    function encodePayload(value) {
      return btoa(unescape(encodeURIComponent(JSON.stringify(value))));
    }

    function nextTimeLabel(index) {
      const hour = 18 + Math.floor((index - 1) / 2);
      const minute = (index - 1) % 2 === 0 ? "00" : "30";
      return `${String(hour).padStart(2, "0")}:${minute}`;
    }

    function moveMethodLabel(value) {
      return {
        publictransit: "버스/지하철",
        bus: "버스",
        subway: "지하철",
        taxi: "택시",
        car: "자가",
        foot: "걷기"
      }[value] || "버스/지하철";
    }

    function kakaoRouteMethod(value) {
      return {
        publictransit: "publictransit",
        bus: "publictransit",
        subway: "publictransit",
        taxi: "car",
        car: "car",
        foot: "foot"
      }[value] || "publictransit";
    }

    function round(value) {
      return Math.round(value * 1000000) / 1000000;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("visible");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("visible"), 2200);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
